<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 64" fill="none" role="img" aria-label="KenshiChord">
  <defs>
    <linearGradient id="bladeGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F4F1EA"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#8C7424"/>
    </linearGradient>
    <linearGradient id="crimsonGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7A0E14"/>
      <stop offset="100%" stop-color="#E01E2B"/>
    </linearGradient>
  </defs>

  <!-- Mark: katana chord -->
  <g transform="translate(8 8)">
    <circle cx="24" cy="24" r="23" fill="none" stroke="#D4AF37" stroke-width="1" opacity=".6"/>
    <circle cx="24" cy="24" r="17" fill="none" stroke="#D4AF37" stroke-width=".6" opacity=".35"/>
    <!-- katana diagonal -->
    <path d="M3 45 L45 3" stroke="url(#bladeGrad)" stroke-width="3" stroke-linecap="round"/>
    <!-- tsuba (guard) -->
    <rect x="20" y="20" width="8" height="8" rx="1.5" transform="rotate(45 24 24)" fill="url(#crimsonGrad)" stroke="#D4AF37" stroke-width=".8"/>
    <!-- center -->
    <circle cx="24" cy="24" r="1.6" fill="#0B0B0D"/>
    <!-- string curve -->
    <path d="M3 45 Q24 16 45 3" stroke="#F4F1EA" stroke-width=".7" fill="none" opacity=".75"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(72 0)">
    <text x="0" y="32" font-family="Cinzel, serif" font-weight="900" font-size="22" letter-spacing="3" fill="#F4F1EA">KENSHI</text>
    <text x="0" y="50" font-family="Cinzel, serif" font-weight="500" font-size="13" letter-spacing="6" fill="#D4AF37">CHORD</text>
    <!-- accent dot -->
    <circle cx="118" cy="46" r="2.4" fill="#C1121F"/>
  </g>
</svg>
