<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Circular tsuba-like mark with center red dot and katana silhouette -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#16161A"/>
      <stop offset="100%" stop-color="#0B0B0D"/>
    </radialGradient>
    <linearGradient id="blade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F4F1EA"/>
      <stop offset="50%" stop-color="#D4AF37"/>
      <stop offset="100%" stop-color="#8C7424"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <circle cx="32" cy="32" r="22" fill="none" stroke="#D4AF37" stroke-width="1.2" opacity=".55"/>
  <circle cx="32" cy="32" r="16" fill="none" stroke="#D4AF37" stroke-width=".8" opacity=".3"/>
  <!-- katana blade diagonal -->
  <path d="M14 50 L50 14" stroke="url(#blade)" stroke-width="2.6" stroke-linecap="round"/>
  <!-- tsuba guard -->
  <rect x="29" y="29" width="6" height="6" rx="1" transform="rotate(45 32 32)" fill="#C1121F" stroke="#D4AF37" stroke-width="0.6"/>
  <!-- center dot -->
  <circle cx="32" cy="32" r="1.4" fill="#0B0B0D"/>
  <!-- string -->
  <path d="M14 50 Q32 28 50 14" stroke="#F4F1EA" stroke-width=".6" fill="none" opacity=".7"/>
</svg>
